<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LedgerLock">
  <!-- Mark: a shield whose interior is a sealed chain link -->
  <g transform="translate(12, 12)">
    <!-- shield base -->
    <path d="M48 4 L84 16 V50 C84 72 68 86 48 92 C28 86 12 72 12 50 V16 Z"
          fill="#0F7D6B"/>
    <!-- inner shield bevel -->
    <path d="M48 14 L75 23 V50 C75 66 63 77 48 82 C33 77 21 66 21 50 V23 Z"
          fill="#0C6657"/>
    <!-- chain link (two interlocked links = the hash chain), drawn in negative/white -->
    <g stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round">
      <!-- upper link -->
      <rect x="34" y="30" width="20" height="30" rx="10"/>
      <!-- lower link, interlocked -->
      <rect x="42" y="44" width="20" height="30" rx="10"/>
    </g>
    <!-- seal dot: the WORM checkpoint -->
    <circle cx="48" cy="52" r="3.2" fill="#3FB6C4"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(112, 0)">
    <text x="0" y="56" font-family="Geist, 'Helvetica Neue', Arial, sans-serif"
          font-size="40" font-weight="700" letter-spacing="-1" fill="#16181D">Ledger<tspan fill="#0F7D6B">Lock</tspan></text>
    <text x="2" y="82" font-family="'IBM Plex Mono', ui-monospace, monospace"
          font-size="13" letter-spacing="2" fill="#8B95A4">TAMPER-EVIDENT AUDIT TRAIL</text>
  </g>
</svg>
